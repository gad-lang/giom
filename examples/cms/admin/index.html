<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GION CMS Admin</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--bg:#0f172a;--panel:#111827;--soft:#1f2937;--line:#334155;--text:#f8fafc;--muted:#94a3b8;--brand:#8b5cf6;--brand2:#06b6d4;--ok:#22c55e}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#312e81 0,#0f172a 38%,#020617 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}button,input,textarea,select{font:inherit}.shell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}.side{padding:28px;border-right:1px solid rgba(255,255,255,.1);background:rgba(15,23,42,.72);backdrop-filter:blur(18px)}.brand{font-size:1.45rem;font-weight:850;letter-spacing:-.04em;margin-bottom:28px}.nav{display:grid;gap:10px}.nav button{border:0;text-align:left;color:var(--text);background:transparent;padding:12px 14px;border-radius:14px;cursor:pointer}.nav button.active,.nav button:hover{background:linear-gradient(135deg,rgba(139,92,246,.28),rgba(6,182,212,.18))}.main{padding:30px;width:min(1280px,100%)}.hero{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:22px}.hero h1{font-size:clamp(2rem,5vw,4rem);line-height:.95;margin:0;letter-spacing:-.07em}.hero p{color:var(--muted);max-width:680px;line-height:1.7}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0}.stat,.panel{border:1px solid rgba(255,255,255,.1);background:rgba(15,23,42,.72);border-radius:24px;box-shadow:0 22px 80px rgba(0,0,0,.22)}.stat{padding:18px}.stat strong{display:block;font-size:2rem}.stat span,.hint{color:var(--muted)}.panel{padding:18px;margin-bottom:18px}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.button{border:0;border-radius:999px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:10px 16px;font-weight:750;cursor:pointer}.ghost{background:#1e293b}.danger{background:#ef4444}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field{display:grid;gap:7px;margin-bottom:12px}.field span{font-size:.86rem;color:var(--muted)}input,textarea,select{width:100%;border:1px solid var(--line);background:#0b1220;color:var(--text);border-radius:14px;padding:11px 12px}textarea{min-height:110px;resize:vertical}.row{display:flex;gap:10px;flex-wrap:wrap}.list{display:grid;gap:10px}.item{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:16px;padding:12px}.item h3{margin:0 0 4px;font-size:1rem}.item p{margin:0;color:var(--muted);font-size:.9rem}.pill{display:inline-flex;background:rgba(34,197,94,.16);color:#86efac;padding:5px 9px;border-radius:999px;font-size:.78rem}@media(max-width:900px){.shell{grid-template-columns:1fr}.side{position:static}.cards,.grid{grid-template-columns:1fr}.hero{display:block}}
+  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/admin/src/App.jsx"></script>
</body>
</html>
